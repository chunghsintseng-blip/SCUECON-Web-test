    <text x="24" y="368" class="tiny ink">基礎金融商品定價</text>
    <text x="24" y="390" class="tiny ink">債券投資分析與實務</text>
    <text x="24" y="412" class="tiny ink">量化交易</text>
    <text x="24" y="434" class="tiny ink">選擇權定價概論</text>
    <text x="24" y="456" class="tiny ink">金融理財與生活(A)(B)</text>
  </g>

