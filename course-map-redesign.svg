  <g transform="translate(116 1110)">
    <rect width="660" height="122" rx="12" class="soft-blue" stroke="#d5e2f3" stroke-width="2"/>
    <text x="24" y="32" class="h3 ink">專業學程</text>
    <rect x="24" y="48" width="292" height="48" rx="8" class="paper" stroke="#d8deea" stroke-width="1.5"/>
    <text x="42" y="78" class="body ink">財務金融學程</text>
    <rect x="336" y="48" width="292" height="48" rx="8" class="paper" stroke="#d8deea" stroke-width="1.5"/>
