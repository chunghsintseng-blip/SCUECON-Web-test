    <text x="24" y="280" class="tiny ink">臺灣經濟發展與成長</text>
    <text x="24" y="302" class="tiny ink">經濟學的基礎應用</text>
    <text x="24" y="324" class="tiny ink">環境經濟與永續發展</text>
