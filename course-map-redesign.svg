    <text x="24" y="368" class="tiny ink">公共政策與財經專題(一)(二)</text>
    <text x="24" y="390" class="tiny ink">進出口實務-政府管理面</text>
    <text x="24" y="412" class="tiny ink">經濟發展</text>
    <text x="24" y="434" class="tiny ink">R語言與政治經濟學</text>
  </g>

