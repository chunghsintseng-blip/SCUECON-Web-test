    <text x="24" y="154" class="tiny ink">區域經濟學</text>
    <text x="24" y="184" class="tiny ink">產業經濟學</text>
    <text x="24" y="214" class="tiny ink">勞動經濟學</text>
    <text x="24" y="244" class="tiny ink">海外經濟研究</text>
    <text x="24" y="274" class="tiny ink">亞洲經濟研究</text>
    <text x="24" y="304" class="tiny ink">校外實習(一)(二)(三)</text>
    <text x="24" y="334" class="tiny ink">職場溝通、倫理與職場權益</text>
    <text x="24" y="364" class="tiny ink">管理經濟專題</text>
  </g>

