<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="1360" viewBox="0 0 1660 1360" role="img" aria-labelledby="title desc">
  <title id="title">東吳大學經濟學系學士班課程地圖</title>
  <desc id="desc">以基礎課程、核心課程、專業分流、學程認證與職涯發展整理經濟學系學士班課程。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#18202f" flood-opacity=".12"/>
    </filter>
    <style>
      .bg { fill: #f5f7fb; }
      .paper { fill: #ffffff; }
      .ink { fill: #172033; }
      .muted { fill: #667085; }
      .line { stroke: #d8deea; stroke-width: 2; }
      .thin { stroke: #e7ebf2; stroke-width: 1.5; }
      .brand { fill: #1c3b7f; }
      .brand-dark { fill: #142c61; }
      .gold { fill: #b88a3d; }
      .blue { fill: #105389; }
      .green { fill: #4f7f74; }
      .teal { fill: #2f758a; }
      .purple { fill: #58608f; }
      .soft-red { fill: #eef3fb; }
      .soft-blue { fill: #eef4fb; }
      .soft-green { fill: #edf6f3; }
      .soft-gold { fill: #fbf4e8; }
      .soft-teal { fill: #eaf7f8; }
      .white { fill: #ffffff; }
      .h1 { font: 800 54px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .h2 { font: 800 28px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .h3 { font: 800 23px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .body { font: 500 19px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .small { font: 700 16px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .tiny { font: 600 14px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
      .chip { font: 800 15px "Noto Sans TC", "Microsoft JhengHei", sans-serif; letter-spacing: 0; }
    </style>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2 L10 6 L2 10 Z" fill="#9aa4b5"/>
    </marker>
  </defs>

  <rect class="bg" width="1660" height="1360"/>
  <rect x="60" y="48" width="1540" height="1244" rx="18" class="paper" filter="url(#shadow)"/>

  <rect x="60" y="48" width="1540" height="176" rx="18" class="brand-dark"/>
  <path d="M60 206 H1600 V224 H60 Z" class="brand"/>
  <circle cx="1300" cy="20" r="220" fill="#ffffff" opacity=".07"/>
  <circle cx="1510" cy="176" r="170" fill="#ffffff" opacity=".07"/>
  <text x="116" y="116" class="small white">東吳大學經濟學系 Department of Economics</text>
  <text x="116" y="176" class="h1 white">學士班課程地圖</text>
  <text x="1058" y="118" class="body white" opacity=".92">基礎課程 → 核心課程 → 專業分流 → 職涯發展</text>
  <text x="1058" y="158" class="body white" opacity=".78">以學生選課、學程認證與職涯規劃為核心</text>

  <text x="116" y="284" class="h2 ink">四年學習路徑</text>
  <text x="116" y="318" class="body muted">先建立共同能力，再依興趣選擇專業方向。</text>

  <foreignObject x="116" y="350" width="320" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height:150px; box-sizing:border-box; border:2px solid #ead4d9; border-radius:12px; background:#eef3fb; padding:18px; font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;">
      <div style="color:#1c3b7f; font-size:15px; font-weight:900;">一年級</div>
      <div style="margin-top:6px; color:#172033; font-size:23px; font-weight:800; line-height:1.25;">基礎課程</div>
      <div style="margin-top:8px; color:#667085; font-size:16px; font-weight:600; line-height:1.55;">微積分、經濟學原理、會計學，建立經濟與商業分析基礎。</div>
    </div>
  </foreignObject>
  <line x1="448" y1="425" x2="482" y2="425" class="line" marker-end="url(#arrow)"/>

  <foreignObject x="494" y="350" width="320" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height:150px; box-sizing:border-box; border:2px solid #d5e2f3; border-radius:12px; background:#eef4fb; padding:18px; font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;">
      <div style="color:#105389; font-size:15px; font-weight:900;">二年級</div>
      <div style="margin-top:6px; color:#172033; font-size:23px; font-weight:800; line-height:1.25;">核心課程</div>
      <div style="margin-top:8px; color:#667085; font-size:16px; font-weight:600; line-height:1.55;">個體經濟學、總體經濟學、統計學、經濟數學，強化理論與量化分析能力。</div>
    </div>
  </foreignObject>
  <line x1="826" y1="425" x2="860" y2="425" class="line" marker-end="url(#arrow)"/>

  <foreignObject x="872" y="350" width="320" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height:150px; box-sizing:border-box; border:2px solid #d2e8df; border-radius:12px; background:#edf6f3; padding:18px; font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;">
      <div style="color:#4f7f74; font-size:15px; font-weight:900;">三至四年級</div>
      <div style="margin-top:6px; color:#172033; font-size:23px; font-weight:800; line-height:1.25;">專業分流</div>
      <div style="margin-top:8px; color:#667085; font-size:16px; font-weight:600; line-height:1.55;">修讀貨幣銀行學、國際貿易、國際金融、財政學，並依興趣進入專業方向。</div>
    </div>
  </foreignObject>
  <line x1="1204" y1="425" x2="1238" y2="425" class="line" marker-end="url(#arrow)"/>

  <foreignObject x="1250" y="350" width="320" height="150">
    <div xmlns="http://www.w3.org/1999/xhtml" style="height:150px; box-sizing:border-box; border:2px solid #ead8b9; border-radius:12px; background:#fbf4e8; padding:18px; font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;">
      <div style="color:#b88a3d; font-size:15px; font-weight:900;">畢業後</div>
      <div style="margin-top:6px; color:#172033; font-size:23px; font-weight:800; line-height:1.25;">職涯發展</div>
      <div style="margin-top:8px; color:#667085; font-size:16px; font-weight:600; line-height:1.55;">銜接研究所、金融業、公部門、資料分析與產業研究。</div>
    </div>
  </foreignObject>

  <text x="116" y="540" class="h2 ink">專業分流與建議課程</text>
  <text x="116" y="574" class="body muted">四個方向可交叉修讀；下列為選課規劃時最容易理解的分組方式。</text>

