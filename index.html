<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>東吳經濟 Demo Pages</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #21313f;
      --muted: #667789;
      --line: #d8e0e8;
      --brand: #8b1f2f;
      --brand-dark: #6f1725;
      --paper: #f7f9fb;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(139, 31, 47, 0.08), rgba(33, 49, 63, 0.08)),
        var(--paper);
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0;
    }

    .masthead {
      margin-bottom: 32px;
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--brand);
      font-size: 15px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.75;
    }

    .links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 36px;
    }

    a.demo {
      display: block;
      min-height: 168px;
      padding: 24px;
      color: inherit;
      text-decoration: none;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 48px rgba(33, 49, 63, 0.08);
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    a.demo:hover,
    a.demo:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(139, 31, 47, 0.45);
      box-shadow: 0 22px 56px rgba(33, 49, 63, 0.12);
      outline: none;
    }

    .demo strong {
      display: block;
      color: var(--brand-dark);
      font-size: 22px;
      line-height: 1.35;
    }

    .demo span {
      display: block;
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.7;
    }

    @media (max-width: 720px) {
      main {
        padding: 48px 0;
      }

      .links {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="masthead" aria-labelledby="page-title">
      <p class="eyebrow">SCU Economics Demo</p>
      <h1 id="page-title">東吳大學經濟學系 Demo 頁面</h1>
      <p class="lead">這裡整理目前上傳到 GitHub Pages 的兩個測試頁面，可直接進入預覽招生資訊與課程地圖設計。</p>
    </section>

    <nav class="links" aria-label="Demo pages">
      <a class="demo" href="admission-undergrad-demo.html">
        <strong>學士班招生資訊 Demo</strong>
        <span>查看學士班招生頁面的版面、資訊區塊與行動按鈕。</span>
      </a>
      <a class="demo" href="course-map-demo.html">
        <strong>學士班課程地圖 Demo</strong>
        <span>查看課程地圖頁面，以及重新設計的課程架構圖。</span>
      </a>
    </nav>
  </main>
</body>
</html>
